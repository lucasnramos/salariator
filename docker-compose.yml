version: '3'

services:
  apache:
    image: 'php:7.4-apache'
    container_name: php
    restart: always
    ports:
      - '80:80'
    volumes:
      - ./src:/var/www/html
  db:
    container_name: mysql
    image: mysql:5.7
    restart: always
    ports:
      - '3306:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=salariator  
